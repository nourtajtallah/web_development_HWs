<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #5a4fcf;
            margin-bottom: 25px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-btn {
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .add-btn:hover {
            background: #5568d8;
        }

        ul {
            list-style: none;
            margin-top: 25px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f7f8fc;
            padding: 12px 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            transition: 0.3s;
        }

        li:hover {
            transform: translateY(-2px);
        }

        .task {
            flex: 1;
            cursor: pointer;
        }

        .completed {
            text-decoration: line-through;
            color: #999;
        }

        .delete-btn {
            border: none;
            background: #ff5c5c;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #e64545;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📝 My To-Do List</h1>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        const taskInput = document.getElementById("taskInput");
        const taskList = document.getElementById("taskList");

        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

        function saveTasks() {
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function renderTasks() {
            taskList.innerHTML = "";

            tasks.forEach((task, index) => {
                const li = document.createElement("li");

                const span = document.createElement("span");
                span.className = "task";
                span.textContent = task.text;

                if (task.completed) {
                    span.classList.add("completed");
                }

                span.onclick = () => {
                    tasks[index].completed = !tasks[index].completed;
                    saveTasks();
                    renderTasks();
                };

                const delBtn = document.createElement("button");
                delBtn.textContent = "Delete";
                delBtn.className = "delete-btn";

                delBtn.onclick = () => {
                    tasks.splice(index, 1);
                    saveTasks();
                    renderTasks();
                };

                li.appendChild(span);
                li.appendChild(delBtn);

                taskList.appendChild(li);
            });
        }

        function addTask() {
            const text = taskInput.value.trim();

            if (text === "") return;

            tasks.push({
                text: text,
                completed: false
            });

            saveTasks();
            renderTasks();

            taskInput.value = "";
        }

        taskInput.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                addTask();
            }
        });

        renderTasks();
    </script>

</body>

</html>
